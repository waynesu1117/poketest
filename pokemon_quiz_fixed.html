<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寶可夢御三家心理測驗</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  :root{
    --bg:#08081a;--surface:#10102a;--surface2:#181830;
    --border:rgba(140,120,255,0.12);--border-hover:rgba(140,120,255,0.28);
    --text:#eeeeff;--text-muted:rgba(220,218,255,0.55);--text-dim:rgba(200,196,255,0.3);
    --accent:#8b6fff;--accent2:#c084fc;--accent-glow:rgba(139,111,255,0.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
    background-image:
      radial-gradient(ellipse 80% 60% at 10% 0%,rgba(100,80,255,0.12) 0%,transparent 60%),
      radial-gradient(ellipse 60% 60% at 90% 100%,rgba(192,132,252,0.10) 0%,transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%,rgba(80,60,200,0.04) 0%,transparent 70%)}

  /* ── HOMEPAGE ── */
  #homepage{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:3rem 1.5rem 4rem}

  .home-eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:16px;animation:fadeUp .6s ease both}

  .home-title{font-size:clamp(28px,6vw,48px);font-weight:900;letter-spacing:-.03em;
    text-align:center;line-height:1.1;margin-bottom:10px;
    animation:fadeUp .6s .05s ease both}

  .home-title span{
    background:linear-gradient(135deg,#fff 30%,var(--accent2) 80%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

  .home-sub{font-size:14px;color:var(--text-muted);text-align:center;line-height:1.7;
    max-width:380px;margin-bottom:2.5rem;animation:fadeUp .6s .1s ease both}

  .start-btn{
    padding:14px 40px;border-radius:12px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;font-size:15px;font-weight:700;color:#fff;cursor:pointer;
    font-family:inherit;letter-spacing:.02em;
    box-shadow:0 6px 28px rgba(139,111,255,0.4);
    transition:transform .15s,box-shadow .15s;
    animation:fadeUp .6s .15s ease both;
    margin-bottom:3rem}
  .start-btn:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(139,111,255,0.55)}
  .start-btn:active{transform:scale(.97)}

  .gen-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--text-dim);margin-bottom:12px;text-align:left;width:100%;max-width:720px;
    padding-left:4px}

  .gen-section{width:100%;max-width:720px;margin-bottom:2rem;animation:fadeUp .5s ease both}

  .poke-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  @media(min-width:480px){.poke-grid{grid-template-columns:repeat(5,1fr)}}
  @media(min-width:640px){.poke-grid{grid-template-columns:repeat(9,1fr)}}

  .poke-card{
    background:var(--surface);border:.5px solid var(--border);border-radius:12px;
    padding:10px 6px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;
    cursor:pointer;transition:border-color .15s,background .15s,transform .15s;
    position:relative;overflow:hidden}
  .poke-card::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(circle at 50% 0%,var(--accent-glow),transparent 70%);
    opacity:0;transition:opacity .2s}
  .poke-card:hover{border-color:var(--border-hover);transform:translateY(-3px);background:rgba(139,111,255,0.06)}
  .poke-card:hover::before{opacity:1}

  .poke-card img{width:52px;height:52px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(139,111,255,0.3));transition:transform .2s}
  .poke-card:hover img{transform:scale(1.1)}
  .poke-card .poke-fallback{font-size:32px;line-height:52px;height:52px}
  .poke-name{font-size:10px;color:var(--text-muted);text-align:center;line-height:1.3;font-weight:500}

  .type-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

  /* gen colors */
  .gen1{--gc:rgba(255,100,80,0.15);--gb:rgba(255,100,80,0.35)}
  .gen2{--gc:rgba(255,180,50,0.15);--gb:rgba(255,180,50,0.35)}
  .gen3{--gc:rgba(80,200,120,0.15);--gb:rgba(80,200,120,0.35)}
  .gen4{--gc:rgba(80,160,255,0.15);--gb:rgba(80,160,255,0.35)}
  .gen5{--gc:rgba(200,80,200,0.15);--gb:rgba(200,80,200,0.35)}
  .gen6{--gc:rgba(255,140,60,0.15);--gb:rgba(255,140,60,0.35)}
  .gen7{--gc:rgba(60,220,200,0.15);--gb:rgba(60,220,200,0.35)}
  .gen8{--gc:rgba(140,100,255,0.15);--gb:rgba(140,100,255,0.35)}
  .gen9{--gc:rgba(255,80,140,0.15);--gb:rgba(255,80,140,0.35)}
  .poke-card.gen1,.poke-card.gen2,.poke-card.gen3,.poke-card.gen4,.poke-card.gen5,
  .poke-card.gen6,.poke-card.gen7,.poke-card.gen8,.poke-card.gen9{
    background:var(--gc);border-color:var(--gb)}
  .poke-card.gen1:hover,.poke-card.gen2:hover,.poke-card.gen3:hover,
  .poke-card.gen4:hover,.poke-card.gen5:hover,.poke-card.gen6:hover,
  .poke-card.gen7:hover,.poke-card.gen8:hover,.poke-card.gen9:hover{
    border-color:var(--accent);background:rgba(139,111,255,0.1)}

  .home-footer{font-size:11px;color:var(--text-dim);text-align:center;margin-top:1rem}

  /* ── QUIZ ── */
  #quizpage{display:none;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem}
  #quizpage.active{display:flex}
  .quiz-container{width:100%;max-width:560px}

  .progress-wrap{margin-bottom:1.75rem;animation:fadeUp .6s .1s ease both}
  .progress-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:8px}
  .progress-track{height:2px;background:var(--surface2);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
    border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px var(--accent-glow)}
  .card{background:var(--surface);border:.5px solid var(--border);border-radius:18px;padding:1.75rem;
    animation:fadeUp .5s .15s ease both;box-shadow:0 4px 40px rgba(80,60,200,0.08),0 1px 0 rgba(140,120,255,0.06) inset}
  .q-num{font-size:11px;color:var(--text-dim);letter-spacing:.06em;margin-bottom:10px}
  .q-text{font-size:17px;font-weight:500;line-height:1.55;margin-bottom:1.5rem}
  .options{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
  .opt{display:flex;align-items:center;gap:12px;background:var(--surface2);border:.5px solid var(--border);
    border-radius:10px;padding:13px 15px;cursor:pointer;font-size:13px;color:rgba(220,218,255,0.65);
    line-height:1.45;text-align:left;transition:border-color .15s,background .15s,color .15s;
    width:100%;font-family:inherit}
  .opt:hover{border-color:var(--border-hover);color:var(--text);background:rgba(140,120,255,0.06)}
  .opt.sel{border-color:var(--accent);background:var(--accent-glow);color:var(--text);
    box-shadow:0 0 0 1px rgba(139,111,255,0.15)}
  .opt.sel .opt-lbl{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent);color:#fff}
  .opt-lbl{width:22px;height:22px;border-radius:50%;border:.5px solid var(--border-hover);
    display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-dim);
    flex-shrink:0;transition:background .15s,border-color .15s,color .15s;font-weight:500}
  .next-btn{width:100%;padding:13px;border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;
    font-size:14px;font-weight:500;color:#fff;cursor:pointer;opacity:.25;pointer-events:none;
    transition:opacity .2s,transform .1s,box-shadow .2s;font-family:inherit;letter-spacing:.01em}
  .next-btn.on{opacity:1;pointer-events:auto;box-shadow:0 4px 20px rgba(139,111,255,0.35)}
  .next-btn.on:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(139,111,255,0.45)}
  .next-btn.on:active{transform:scale(.98)}

  /* ── RESULT ── */
  .result{text-align:center;animation:fadeUp .5s ease both}
  .result-img-wrap{width:140px;height:140px;margin:0 auto 1rem;position:relative;
    animation:pop .6s cubic-bezier(.3,1.4,.6,1) both}
  .result-img-wrap::before{content:'';position:absolute;inset:-10px;border-radius:50%;
    background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);
    animation:pulse 2.5s ease-in-out infinite}
  .result-img{width:140px;height:140px;object-fit:contain;position:relative;
    filter:drop-shadow(0 4px 20px rgba(139,111,255,0.4))}
  .result-img-fallback{font-size:72px;line-height:140px;display:block}
  .result-name{font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px;
    background:linear-gradient(90deg,#fff 60%,var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .result-gen{font-size:12px;color:var(--text-dim);margin-bottom:12px;letter-spacing:.04em}
  .type-badge{display:inline-block;font-size:11px;font-weight:500;padding:4px 14px;
    border-radius:20px;margin-bottom:1.25rem;letter-spacing:.04em}
  .result-desc{font-size:13px;color:var(--text-muted);line-height:1.85;margin-bottom:1.5rem;
    text-align:left;padding:0 4px}
  .divider{height:.5px;background:var(--border);margin-bottom:1.25rem}
  .scores-label{font-size:11px;color:var(--text-dim);letter-spacing:.06em;margin-bottom:10px;text-align:left}
  .scores-row{display:flex;gap:10px;margin-bottom:1.5rem;justify-content:center}
  .top3-card{flex:1;max-width:120px;display:flex;flex-direction:column;align-items:center;gap:4px;
    border:.5px solid transparent;border-radius:14px;padding:12px 8px 10px;position:relative}
  .top3-rank{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;opacity:.8}
  .top3-img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(139,111,255,0.3))}
  .top3-fallback{font-size:40px;line-height:64px;height:64px}
  .top3-name{font-size:11px;font-weight:600;text-align:center;line-height:1.3}
  .top3-toggle{margin-top:6px;background:none;border:.5px solid transparent;border-radius:6px;
    padding:4px 8px;font-size:10px;font-weight:500;cursor:pointer;font-family:inherit;
    letter-spacing:.04em;transition:opacity .15s,transform .15s;opacity:.7}
  .top3-toggle:hover{opacity:1}
  .top3-toggle.open{transform:rotate(180deg) translateY(-1px)}
  .top3-desc{font-size:11px;line-height:1.7;color:rgba(220,218,255,0.6);text-align:left;
    margin-top:8px;max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .3s;
    opacity:0;padding:0 2px}
  .top3-desc.open{max-height:300px;opacity:1}
  .score-pill{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500;border:.5px solid transparent}
  .result-btns{display:flex;gap:8px}
  .retry-btn{flex:1;background:var(--surface2);border:.5px solid var(--border-hover);border-radius:10px;
    padding:11px;font-size:13px;cursor:pointer;color:var(--text-muted);font-family:inherit;
    transition:background .15s,color .15s,border-color .15s}
  .retry-btn:hover{background:rgba(140,120,255,0.08);color:var(--text);border-color:var(--accent)}
  .home-btn{flex:1;background:var(--surface2);border:.5px solid var(--border-hover);border-radius:10px;
    padding:11px;font-size:13px;cursor:pointer;color:var(--text-muted);font-family:inherit;
    transition:background .15s,color .15s,border-color .15s}
  .home-btn:hover{background:rgba(140,120,255,0.08);color:var(--text);border-color:var(--accent)}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
  @keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
</style>
</head>
<body>

<!-- ══ HOMEPAGE ══ -->
<div id="homepage">
  <div class="home-eyebrow">Pokémon Starter Quiz</div>
  <h1 class="home-title"><span>你是哪隻御三家？</span></h1>
  <p class="home-sub">12 道情境題，從 9 個世代、27 隻御三家中<br>找出和你最像的那一隻</p>
  <button class="start-btn" onclick="startQuiz()">開始測驗 →</button>

  <!-- Gen 1 -->
  <div class="gen-section" style="animation-delay:.2s">
    <div class="gen-label">第一世代 — 關都地區</div>
    <div class="poke-grid" id="grid-gen1"></div>
  </div>
  <!-- Gen 2 -->
  <div class="gen-section" style="animation-delay:.25s">
    <div class="gen-label">第二世代 — 城都地區</div>
    <div class="poke-grid" id="grid-gen2"></div>
  </div>
  <!-- Gen 3 -->
  <div class="gen-section" style="animation-delay:.3s">
    <div class="gen-label">第三世代 — 豐緣地區</div>
    <div class="poke-grid" id="grid-gen3"></div>
  </div>
  <!-- Gen 4 -->
  <div class="gen-section" style="animation-delay:.35s">
    <div class="gen-label">第四世代 — 神奧地區</div>
    <div class="poke-grid" id="grid-gen4"></div>
  </div>
  <!-- Gen 5 -->
  <div class="gen-section" style="animation-delay:.4s">
    <div class="gen-label">第五世代 — 合眾地區</div>
    <div class="poke-grid" id="grid-gen5"></div>
  </div>
  <!-- Gen 6 -->
  <div class="gen-section" style="animation-delay:.45s">
    <div class="gen-label">第六世代 — 卡洛斯地區</div>
    <div class="poke-grid" id="grid-gen6"></div>
  </div>
  <!-- Gen 7 -->
  <div class="gen-section" style="animation-delay:.5s">
    <div class="gen-label">第七世代 — 阿羅拉地區</div>
    <div class="poke-grid" id="grid-gen7"></div>
  </div>
  <!-- Gen 8 -->
  <div class="gen-section" style="animation-delay:.55s">
    <div class="gen-label">第八世代 — 伽勒爾地區</div>
    <div class="poke-grid" id="grid-gen8"></div>
  </div>
  <!-- Gen 9 -->
  <div class="gen-section" style="animation-delay:.6s">
    <div class="gen-label">第九世代 — 帕底亞地區</div>
    <div class="poke-grid" id="grid-gen9"></div>
  </div>

  <p class="home-footer">共 9 世代 · 27 隻御三家</p>
</div>

<!-- ══ QUIZ PAGE ══ -->
<div id="quizpage">
  <div class="quiz-container">
    <div id="app"></div>
  </div>
</div>

<script>
const POKEDEX={bulbasaur:1,charmander:4,squirtle:7,chikorita:152,cyndaquil:155,totodile:158,
treecko:252,torchic:255,mudkip:258,turtwig:387,chimchar:390,piplup:393,snivy:495,tepig:498,

const P=[

  {id:"cyndaquil",  n:"火球鼠",  g:"第二世代",gen:2,s:"🐾",tn:"火",   bg:"rgba(216,90,48,0.15)",  border:"rgba(216,90,48,0.35)", tx:"#f4956a"},
  {id:"totodile",   n:"小鋸鱷",  g:"第二世代",gen:2,s:"🐊",tn:"水",   bg:"rgba(55,138,221,0.15)", border:"rgba(55,138,221,0.35)",tx:"#7ab8f0"},
  {id:"treecko",    n:"木守宮",  g:"第三世代",gen:3,s:"🦎",tn:"草",   bg:"rgba(99,153,34,0.15)",  border:"rgba(99,153,34,0.35)", tx:"#a3d96a"},

  {id:"turtwig",    n:"草苗龜",  g:"第四世代",gen:4,s:"🐢",tn:"草",   bg:"rgba(99,153,34,0.15)",  border:"rgba(99,153,34,0.35)", tx:"#a3d96a"},

  {id:"chespin",    n:"哈力栗",  g:"第六世代",gen:6,s:"🌰",tn:"草",   bg:"rgba(99,153,34,0.15)",  border:"rgba(99,153,34,0.35)", tx:"#a3d96a"},
  {id:"fennekin",   n:"火狐狸",  g:"第六世代",gen:6,s:"🦊",tn:"火",   bg:"rgba(216,90,48,0.15)",  border:"rgba(216,90,48,0.35)", tx:"#f4956a"},
  {id:"froakie",    n:"呱呱泡蛙",g:"第六世代",gen:6,s:"🐸",tn:"水",   bg:"rgba(55,138,221,0.15)", border:"rgba(55,138,221,0.35)",tx:"#7ab8f0"},
  {id:"rowlet",     n:"木木梟",  g:"第七世代",gen:7,s:"🦉",tn:"草/飛",bg:"rgba(99,153,34,0.15)",  border:"rgba(99,153,34,0.35)", tx:"#a3d96a"},
  {id:"litten",     n:"火斑喵",  g:"第七世代",gen:7,s:"🐱",tn:"火",   bg:"rgba(216,90,48,0.15)",  border:"rgba(216,90,48,0.35)", tx:"#f4956a"},

// Build homepage grids
function buildGrids(){
  for(let g=1;g<=9;g++){
    const grid=document.getElementById(`grid-gen${g}`);
    if(!grid)continue;
    P.filter(p=>p.gen===g).forEach(p=>{
      const card=document.createElement('div');
      card.className=`poke-card gen${g}`;
      card.title=`${p.n} — ${p.tn}屬性`;
      // cards are display only
      const imgUrl=getImg(p.id);
      card.innerHTML=`
        ${imgUrl
          ?`<img src="${imgUrl}" alt="${p.n}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <span class="poke-fallback" style="display:none">${p.s}</span>`
          :`<span class="poke-fallback">${p.s}</span>`}
        <div class="poke-name">${p.n}</div>`;
      grid.appendChild(card);
    });
  }
}
buildGrids();

function startQuiz(){
  document.getElementById('homepage').style.display='none';

function goHome(){
  document.getElementById('quizpage').classList.remove('active');

  window.scrollTo(0,0);
}

function toggleDesc(id, btn){
  const el=document.getElementById(id);
  if(!el)return;
  el.classList.toggle('open');
  btn.classList.toggle('open');
  btn.textContent=el.classList.contains('open')?'收起 ↑':'了解更多 ↓';
}

function initQuiz(){
  cur=0;chosenOpts=[];selIdx=null;
  P.forEach(p=>{scores[p.id]=0;});
  render();
}

function render(){
  const app=document.getElementById('app');
  if(cur>=Q.length){showResult(app);return;}
  const q=Q[cur];
  const pct=Math.round(cur/Q.length*100);
  app.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-meta"><span>進度</span><span>${cur+1} / ${Q.length}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card">
      <div class="q-num">第 ${cur+1} 題</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o,i)=>`
          <button class="opt" data-i="${i}">
            <span class="opt-lbl">${['A','B','C','D'][i]}</span>
            <span>${o.t}</span>
          </button>`).join('')}
      </div>
      <button class="next-btn" id="nb">${cur<Q.length-1?'下一題 →':'揭曉結果 →'}</button>
    </div>`;
  selIdx=null;
  document.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      selIdx=parseInt(btn.dataset.i);
      document.getElementById('nb').classList.add('on');
    });
  });
  document.getElementById('nb').addEventListener('click',()=>{
    if(selIdx===null)return;
    chosenOpts.push(selIdx);
    Q[cur].opts[selIdx].p.forEach(name=>{
      const id=nameToId[name];
      if(id!==undefined)scores[id]+=2;
    });
    cur++;selIdx=null;render();
  });
}

function showResult(app){
  const top=Math.max(...Object.values(scores));
  const tied=P.filter(p=>scores[p.id]===top);
  let winner;
  if(tied.length===1){
    winner=tied[0];
  } else {
    const sig={};
    tied.forEach(p=>{sig[p.id]=0;});
    Q.forEach((q,qi)=>{
      const oi=chosenOpts[qi];
      q.opts[oi].p.forEach(name=>{
        const id=nameToId[name];
        if(sig[id]!==undefined)sig[id]+=PRIMES[qi];
      });
    });
    const topSig=Math.max(...tied.map(p=>sig[p.id]));
    winner=tied.find(p=>sig[p.id]===topSig)||tied[0];
  }

  const top3=P.filter(p=>scores[p.id]>0&&p.id!==winner.id).sort((a,b)=>scores[b.id]-scores[a.id]).slice(0,3);
  const top3html=top3.map((p,i)=>{
    const img=getImg(p.id);
    const desc=descs[p.id]||'';
    const cardId='top3-desc-'+p.id;
    return`<div class="top3-card" style="background:${p.bg};border-color:${p.border}">
      <div class="top3-rank" style="color:${p.tx}">#${i+2}</div>
      ${img?`<img src="${img}" alt="${p.n}" class="top3-img" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="top3-fallback" style="display:none">${p.s}</span>`:`<span class="top3-fallback">${p.s}</span>`}
      <div class="top3-name" style="color:${p.tx}">${p.n}</div>
      <button class="top3-toggle" onclick="toggleDesc('${cardId}',this)" style="color:${p.tx};border-color:${p.tx}20">了解更多 ↓</button>
      <div class="top3-desc" id="${cardId}">${desc}</div>
    </div>`;
  }).join('');
  const imgUrl=getImg(winner.id);
  const imgHtml=imgUrl
    ?`<div class="result-img-wrap"><img class="result-img" src="${imgUrl}" alt="${winner.n}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="result-img-fallback" style="display:none">${winner.s}</span></div>`
    :`<div class="result-img-wrap"><span class="result-img-fallback">${winner.s}</span></div>`;

  app.innerHTML=`
    <div class="card">
      <div class="result">
        ${imgHtml}
        <div class="result-name">${winner.n}</div>
        <div class="result-gen">${winner.g}</div>
        <div class="type-badge" style="background:${winner.bg};border:.5px solid ${winner.border};color:${winner.tx}">${winner.tn}屬性</div>
        <p class="result-desc">${descs[winner.id]}</p>
        <div class="divider"></div>
        <div class="scores-label">你也很像這幾隻</div>
        <div class="scores-row">${top3html}</div>
        <div class="result-btns">
          <button class="retry-btn" onclick="initQuiz()">重新測驗</button>
          <button class="home-btn" onclick="goHome()">回首頁</button>
        </div>
      </div>
    </div>`;
}
</script>
</body>
</html>
