<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寶可夢御三家心理測驗</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0f0f5;
    --text-muted: rgba(240,240,245,0.5);
    --text-dim: rgba(240,240,245,0.3);
    --accent: #a78bfa;
    --accent-glow: rgba(167,139,250,0.2);
    --grass-bg: rgba(99,153,34,0.12);
    --grass-border: rgba(99,153,34,0.4);
    --grass-text: #a3d96a;
    --fire-bg: rgba(216,90,48,0.12);
    --fire-border: rgba(216,90,48,0.4);
    --fire-text: #f4956a;
    --water-bg: rgba(55,138,221,0.12);
    --water-border: rgba(55,138,221,0.4);
    --water-text: #7ab8f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(167,139,250,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 90%, rgba(99,153,34,0.04) 0%, transparent 60%);
  }

  .container {
    width: 100%;
    max-width: 560px;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s ease both;
  }

  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.8;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 8px;
  }

  .header p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .progress-wrap {
    margin-bottom: 1.75rem;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .progress-track {
    height: 2px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    animation: fadeUp 0.5s 0.15s ease both;
  }

  .q-num {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }

  .q-text {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.55;
    margin-bottom: 1.5rem;
    color: var(--text);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .opt {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 15px;
    cursor: pointer;
    font-size: 13px;
    color: rgba(240,240,245,0.75);
    line-height: 1.45;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    width: 100%;
    font-family: inherit;
  }

  .opt:hover {
    border-color: var(--border-hover);
    color: var(--text);
    background: rgba(255,255,255,0.04);
  }

  .opt.sel {
    border-color: var(--accent);
    background: var(--accent-glow);
    color: var(--text);
  }

  .opt.sel .opt-lbl {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .opt-lbl {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 0.5px solid var(--border-hover);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    font-weight: 500;
  }

  .next-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    cursor: pointer;
    opacity: 0.25;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.1s;
    font-family: inherit;
    letter-spacing: 0.01em;
  }

  .next-btn.on {
    opacity: 1;
    pointer-events: auto;
  }

  .next-btn.on:hover { transform: translateY(-1px); }
  .next-btn.on:active { transform: scale(0.98); }

  .result {
    text-align: center;
    animation: fadeUp 0.5s ease both;
  }

  .result-sprite {
    font-size: 72px;
    display: block;
    margin-bottom: 1rem;
    animation: pop 0.5s cubic-bezier(.3,1.4,.6,1) both;
  }

  .result-name {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .result-gen {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }

  .type-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 1.25rem;
    letter-spacing: 0.04em;
  }

  .result-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.8;
    margin-bottom: 1.5rem;
    text-align: left;
    padding: 0 4px;
  }

  .divider {
    height: 0.5px;
    background: var(--border);
    margin-bottom: 1.25rem;
  }

  .scores-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    text-align: left;
  }

  .scores-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.5rem;
    justify-content: flex-start;
  }

  .score-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
    border: 0.5px solid transparent;
  }

  .retry-btn {
    background: var(--surface2);
    border: 0.5px solid var(--border-hover);
    border-radius: 10px;
    padding: 11px 28px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
    width: 100%;
  }

  .retry-btn:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.6); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>

const descs={
  bulbasaur:"你是那種讓人覺得「有你在就安心了」的人。不需要站在最前面，卻是所有人都仰賴的存在。你的力量來自深根，默默積累，在最需要的時刻撐起全場。",
  charmander:"你有著不服輸的靈魂。別人說不可能，你偏要試試看。起步或許艱難，但你的熱情是燃料——只要還在燃燒，就沒有終點。",
  squirtle:"你外殼堅硬，內心細膩。你不輕易表露情緒，但觀察力超強，能在混亂中保持清醒。你給人一種「這傢伙不簡單」的感覺。",
  chikorita:"你是真正的溫柔強者。你選擇用愛而不是力量去面對世界，這在別人看來可能是弱點，但其實是你最難被擊垮的地方。",

  mudkip:"你低調、可靠、真誠。你不愛說大話，用行動証明一切。你守護身邊的人從不喊累，是那種讓人想永遠留在身邊的夥伴。",
  turtwig:"你比任何人都踏實。不急、不燥，一步一步把根扎深。別人跑得快，你走得遠——最後站著的往往是你。",

let cur=0, sc={}, selIdx=null;
P.forEach(p => { sc[p.id]=0; });

function applyW(ws){
  P.forEach(p => {
    let add=0;
    Object.entries(ws).forEach(([k,v]) => { if(p.v[k]!==undefined) add+=p.v[k]*v; });
    sc[p.id]+=add;
  });
}

function render(){
  const app=document.getElementById('app');
  if(cur>=Q.length){ showResult(app); return; }
  const q=Q[cur];
  const pct=Math.round(cur/Q.length*100);
  app.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-meta"><span>進度</span><span>${cur+1} / ${Q.length}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card">
      <div class="q-num">第 ${cur+1} 題</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o,i)=>`
          <button class="opt" data-i="${i}">
            <span class="opt-lbl">${['A','B','C','D'][i]}</span>
            <span>${o.t}</span>
          </button>
        `).join('')}
      </div>
      <button class="next-btn" id="nb">${cur<Q.length-1?'下一題 →':'揭曉結果 →'}</button>
    </div>
  `;
  selIdx=null;
  document.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      selIdx=parseInt(btn.dataset.i);
      document.getElementById('nb').classList.add('on');
    });
  });
  document.getElementById('nb').addEventListener('click', () => {
    if(selIdx===null) return;
    applyW(Q[cur].opts[selIdx].w);
    cur++; selIdx=null; render();
  });
}

function showResult(app){
  const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const top=sorted[0][1];
  const tied=sorted.filter(x=>x[1]===top);
  const total=Object.values(sc).reduce((a,b)=>a+b,0);
  const winner=P.find(x=>x.id===tied[total%tied.length][0]);
  const top3=sorted.slice(0,3).map(([id,s])=>{
    const px=P.find(x=>x.id===id);
    return `<span class="score-pill" style="background:${px.bg};border-color:${px.border};color:${px.tx}">${px.s} ${px.n} ${s}分</span>`;
  }).join('');

  app.innerHTML=`
    <div class="card">
      <div class="result">
        <span class="result-sprite">${winner.s}</span>
        <div class="result-name">${winner.n}</div>
        <div class="result-gen">${winner.g}</div>
        <div class="type-badge" style="background:${winner.bg};border:0.5px solid ${winner.border};color:${winner.tx}">${winner.tn}屬性</div>
        <p class="result-desc">${descs[winner.id]}</p>
        <div class="divider"></div>
        <div class="scores-label">分數前三名</div>
        <div class="scores-row">${top3}</div>
        <button class="retry-btn" id="rb">重新測驗</button>
      </div>
    </div>
  `;
  document.getElementById('rb').addEventListener('click', () => {
    cur=0; P.forEach(p=>{sc[p.id]=0;}); selIdx=null; render();
  });
}

render();
</script>
